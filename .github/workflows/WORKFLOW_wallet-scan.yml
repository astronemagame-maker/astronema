name: Wallet registry deep scan

# Scan profond CollectChain (present -> genese) :
#   - registre wallet -> first_seen dans data/wallet_registry_deep.csv (commite)
#   - ARCHIVE de tous les transferts en archive/transfers_runNNN.csv.gz,
#     uploadee dans la Release "chain-archive" (pas commitee : pas de limite
#     100 Mo et le repo reste leger)
# Resumable : chaque run traite SCAN_MINUTES de pages, commit sa progression,
# puis SE RELANCE tout seul tant que la genese n'est pas atteinte
# (garde-fou : 40 runs max). Lancer avec reset=true pour repartir de zero.

on:
  workflow_dispatch:
    inputs:
      minutes:
        description: "Budget de scan par run (minutes)"
        default: "280"
      auto_continue:
        description: "Se relance tout seul jusqu'a la genese"
        type: boolean
        default: true
      reset:
        description: "Repartir de zero (ignore l'etat existant)"
        type: boolean
        default: false

permissions:
  contents: write
  actions: write

concurrency:
  group: veve-wallet-scan
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 340
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Deep scan (tranche)
        env:
          SCAN_MINUTES: ${{ github.event.inputs.minutes || '280' }}
          SCAN_RESET: ${{ github.event.inputs.reset || 'false' }}
        run: python -m scraper.wallet_scan

      - name: Upload archive (Release chain-archive)
        if: ${{ always() }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ls archive/*.csv.gz >/dev/null 2>&1 || { echo "Pas d'archive a uploader."; exit 0; }
          gh release view chain-archive >/dev/null 2>&1 || \
            gh release create chain-archive --title "Archive transferts CollectChain" \
              --notes "CSV.gz par tranche de scan. Colonnes: block,log_index,ts_utc,date_pt,kind,category,veve_uuid,edition,from,to. Dedup par (block,log_index)."
          gh release upload chain-archive archive/*.csv.gz --clobber
          echo "Archive uploadee :" && ls -lh archive/

      - name: Commit de la progression
        if: ${{ always() }}
        run: |
          git config user.name "veve-scan-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/wallet_registry_deep.csv data/wallet_scan_state.json
          if git diff --cached --quiet; then echo "Rien a committer."; exit 0; fi
          git commit -m "wallet-scan: progression $(date -u +%FT%H:%M)"
          for i in 1 2 3; do
            git pull --rebase origin main && git push && break
            sleep $((i * 5))
          done

      - name: Relance auto si pas fini
        if: ${{ always() && github.event.inputs.auto_continue != 'false' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          DONE=$(python -c "import json; print(json.load(open('data/wallet_scan_state.json')).get('done', False))" 2>/dev/null || echo "")
          RUNS=$(python -c "import json; print(json.load(open('data/wallet_scan_state.json')).get('runs', 0))" 2>/dev/null || echo 0)
          if [ "$DONE" = "True" ]; then echo "Scan termine — pas de relance."; exit 0; fi
          if [ "$RUNS" -ge 40 ]; then echo "Garde-fou : 40 runs atteints — relance stoppee."; exit 0; fi
          echo "Scan incomplet (run $RUNS) — relance..."
          gh workflow run wallet-scan.yml --ref main \
            -f minutes="${{ github.event.inputs.minutes || '280' }}" \
            -f auto_continue=true -f reset=false

name: IMX probe (historique pre-migration)

# Teste si l'historique VeVe sur Immutable X (avant la migration vers
# CollectChain, ~nov. 2025) est encore accessible publiquement :
#   1. l'API officielle api.x.immutable.com (v1/transfers, mints, collections)
#   2. a defaut, on cherchera le backend d'immutascan.io (capture DevTools).
# Ne touche a rien — lit et affiche seulement. Coller le log dans le chat.

on:
  workflow_dispatch: {}

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Probe api.x.immutable.com
        run: |
          C=0xa7aefead2f25972d80516628417ac46b3f2604af
          for url in \
            "https://api.x.immutable.com/v1/collections/$C" \
            "https://api.x.immutable.com/v1/transfers?token_address=$C&page_size=2" \
            "https://api.x.immutable.com/v1/mints?token_address=$C&page_size=2" \
            "https://api.x.immutable.com/v1/assets?collection=$C&page_size=1" ; do
            echo "=== GET $url"
            curl -sS -m 20 -w "\nHTTP %{http_code}\n" "$url" | head -c 1200 || echo "(echec curl)"
            echo; echo
          done
      - name: Probe pistes alternatives
        run: |
          C=0xa7aefead2f25972d80516628417ac46b3f2604af
          for url in \
            "https://api.immutable.com/v1/chains/imx/collections/$C" \
            "https://immutascan.io/api/address/$C" ; do
            echo "=== GET $url"
            curl -sS -m 20 -w "\nHTTP %{http_code}\n" "$url" | head -c 800 || echo "(echec curl)"
            echo; echo
          done
